<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6fa;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.3rem;
        }

        .main-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.08);
            margin-top: 30px;
        }

        .nav-btn {
            margin-left: 8px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 shadow-sm">
    <a class="navbar-brand" href="{% url 'dashboard' %}">
        🛒 Sistema de Ventas
    </a>

    <div class="ms-auto d-flex align-items-center">

        <a class="btn btn-outline-light btn-sm nav-btn" href="{% url 'dashboard' %}">
            Dashboard
        </a>

        <a class="btn btn-outline-light btn-sm nav-btn" href="{% url 'venta' %}">
            Ventas
        </a>

        <a class="btn btn-outline-light btn-sm nav-btn" href="{% url 'cierre_caja' %}">
            Caja
        </a>
        <a class="btn btn-outline-light btn-sm nav-btn" href="{% url 'reporte_diario' %}">
            Reportes
        </a>

        <form method="POST" action="{% url 'logout' %}" class="d-inline nav-btn">
            {% csrf_token %}
            <button class="btn btn-danger btn-sm">
                Salir
            </button>
        </form>

    </div>
</nav>

<div class="container">
    <div class="main-container">

        {% block content %}
        {% endblock %}

    </div>
</div>

</body>
</html>
